name: Generate ISTA report

on:
  workflow_dispatch:
  schedule:
    # 18th of every month at 06:00 UTC (GitHub cron is always UTC)
    - cron: "0 6 18 * *"

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run unit tests
        run: python -m pytest -q

      - name: Build REPORT*.md and charts
        env:
          ISTA_EMAIL: ${{ secrets.ISTA_EMAIL }}
          ISTA_PASSWORD: ${{ secrets.ISTA_PASSWORD }}
        run: python -m src.pipeline.report

      - name: Commit report artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add REPORT.md REPORT_*.md assets/charts/ exports/
          git status
          if git diff --staged --quiet; then echo "No report changes"; exit 0; fi
          git commit -m "chore: refresh ISTA report"
          git push
