name: Daily ISTA Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: "10 5 * * *"

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Initialize database schema
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m src.pipeline.init_db

      - name: Run pipeline
        env:
          ISTA_EMAIL: ${{ secrets.ISTA_EMAIL }}
          ISTA_PASSWORD: ${{ secrets.ISTA_PASSWORD }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PIPELINE_DEBUG: ${{ secrets.PIPELINE_DEBUG }}
          PIPELINE_SOURCE: ista
          PIPELINE_TIMEZONE: UTC
        run: python -m src.pipeline.run
